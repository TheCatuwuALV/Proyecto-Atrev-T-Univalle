<!DOCTYPE html>
<html lang="es">

<head>
  <link rel="icon" href="Recources/Borcelle.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://i.pinimg.com/736x/c1/c5/29/c1c529d43e4830aeccd46f06449590f0.jpg">
  <title>OntamiWawa - Centro de Monitoreo GPS</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet" />

  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css">

  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <link rel="stylesheet" href="CSS/styleIndex.css">

</head>

<body>

  <div id="topbar">
    <div>
      <div id="brand">ONTAMIWAWA</div>
      <div id="subbrand">Centro de monitoreo GPS para niños</div>
    </div>

    <div class="top-buttons">
      <button onclick="centrarNino()">Centrar niño</button>
      <a href="kidIdentification.html" class="info-btn">Ver información del niño</a>
    </div>
  </div>

  <div id="alerta">⚠️ ALERTA: El niño salió del perímetro</div>
  <div id="mapa"></div>

  <footer>
    <div class="info-panel">
      <div class="label">ÚLTIMA LECTURA GPS DEL NIÑO</div>
      <div id="gps-coords" class="value">Esperando datos MQTT...</div>
      <div id="last-web" style="font-size: 13px; opacity: 0.65;">Recepción web: ---</div>
    </div>

    <div id="status-pill">SIN ÁREA DEFINIDA</div>

    <div class="info-panel" style="text-align: right;">
      <div id="mqtt-status" style="color: #ff5252; font-weight: bold;">MQTT DESCONECTADO</div>
      <div id="distancia" style="font-size: 15px; opacity: 0.8;">Distancia padre-niño: ---</div>
      <div style="font-size: 12px; opacity: 0.5;">ESP32-S3 → MQTT → OntamiWawa Web</div>
    </div>
  </footer>
  <script src="script/scriptIndex.js"></script>
</body>

</html>
